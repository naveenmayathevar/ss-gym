version: '3.8'

services:
  web:
    build: .
    command: python run.py # Use Flask dev server for local dev
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ss_user
      POSTGRES_PASSWORD: ss_password
      POSTGRES_DB: ss_fitness
    ports:
      - "5432:5432"

volumes:
  postgres_data: