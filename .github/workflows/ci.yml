name: SS Gym CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run all tests
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip packages so the workflow is faster on repeated runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          # These are safe dummy values — tests use SQLite in-memory
          # Real secrets are NEVER stored here; they live in Render's env vars
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///test.db
          STRIPE_API_KEY: sk_test_fake
          STRIPE_PUBLIC_KEY: pk_test_fake
        run: pytest --tb=short -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Render (only on main branch)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        # HOW TO SET THIS UP:
        # 1. Go to your Render dashboard → your web service → Settings
        # 2. Scroll to "Deploy Hooks" → Create a deploy hook → Copy the URL
        # 3. In GitHub: Settings → Secrets and variables → Actions
        # 4. Add a secret called RENDER_DEPLOY_HOOK_URL and paste the URL
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered on Render ✅"